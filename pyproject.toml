[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 100
indent-width = 4

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
docstring-code-format = true

[tool.ruff.lint]
select = [
    # flake8-bugbear
    "B",
    # pycodestyle
    "E",
    "W",
    # Pyflakes
    "F",
    # isort
    "I",
    # TODO - Add additional rule sets (https://docs.astral.sh/ruff/rules/):
    # pyupgrade
    #"UP",
    # flake8-simplify
    #"SIM",
]
ignore = [
    # TODO: Determine if we should use __all__, a reudndant alias, or keep this suppressed.
    "F401",
    # TODO: Line too long
    "E501",
]
fixable = ["ALL"]
unfixable = []

[tool.pyright]
include = ["scenedetect", "tests"]
typeCheckingMode = "basic"
# cv2, av, and moviepy ship without type stubs; these reports generate
# unactionable noise without catching real issues in this codebase.
reportMissingTypeStubs = "none"
reportUnknownMemberType = "none"
reportUnknownArgumentType = "none"
reportUnknownVariableType = "none"
reportUnknownParameterType = "none"
reportMissingParameterType = "none"
reportMissingTypeArgument = "none"
reportUntypedFunctionDecorator = "none"
reportPrivateUsage = "none"
